  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {

    --bounce-blue: #3498DB; --bounce-purple: #9B59B6;
    --app-bg: #F7F5F2; --app-card: #FFFFFF; --app-text: #1A1A1A;
    --app-muted: #888; --app-border: #E8E4DF;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bounce-dark); color: var(--bounce-text); }
  .app-root { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  .view-btn { flex: 1; padding: 8px 16px; border-radius: 8px; border: 1px solid var(--bounce-border); background: transparent; color: var(--bounce-muted); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .view-btn.active { background: var(--bounce-primary); color: white; border-color: var(--bounce-primary); }
  .dashboard { display: flex; flex: 1; overflow: hidden; background: var(--bounce-dark); }
  .sidebar { width: 220px; min-width: 220px; background: #111; border-right: 1px solid var(--bounce-border); display: flex; flex-direction: column; padding: 20px 0; }
  .sidebar-logo { padding: 0 20px 24px; border-bottom: 1px solid var(--bounce-border); }
  .logo-mark { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: white; line-height: 1; }
  .logo-sub { font-size: 10px; color: var(--bounce-primary); text-transform: uppercase; letter-spacing: 2px; margin-top: 2px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; cursor: pointer; font-size: 13px; color: var(--bounce-muted); transition: all 0.15s; font-weight: 500; border-left: 2px solid transparent; }
  .nav-item:hover { color: var(--bounce-text); background: rgba(255,255,255,0.03); }
  .nav-item.active { color: white; border-left-color: var(--bounce-primary); background: rgba(255,107,53,0.08); }
  .nav-badge { margin-left: auto; background: var(--bounce-primary); color: white; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 10px; }
  .nav-section { padding: 16px 20px 6px; font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: #444; font-weight: 600; }
  .main-content { flex: 1; overflow-y: auto; padding: 24px; }
  .main-content::-webkit-scrollbar { width: 6px; }
  .main-content::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  .page-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .page-sub { font-size: 13px; color: var(--bounce-muted); margin-bottom: 24px; }
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--bounce-card); border: 1px solid var(--bounce-border); border-radius: 12px; padding: 16px; }
  .stat-label { font-size: 11px; color: var(--bounce-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 8px; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; line-height: 1; }
  .stat-sub { font-size: 11px; color: var(--bounce-muted); margin-top: 4px; }
  .stat-accent { color: var(--bounce-primary); } .stat-green { color: var(--bounce-green); } .stat-amber { color: var(--bounce-amber); } .stat-red { color: var(--bounce-red); }
  .section { margin-bottom: 24px; }

  .section-action { font-size: 12px; color: var(--bounce-primary); cursor: pointer; font-weight: 600; }
  .jobs-list { display: flex; flex-direction: column; gap: 8px; }

  .job-time-block { text-align: center; min-width: 52px; }

  .job-items { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .job-tag { font-size: 10px; background: rgba(255,107,53,0.1); color: var(--bounce-primary); padding: 2px 8px; border-radius: 20px; font-weight: 600; border: 1px solid rgba(255,107,53,0.2); }
  .job-status-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; flex-wrap: wrap; }

  .status-text { font-size: 11px; color: var(--bounce-muted); }
  .travel-badge { margin-left: auto; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 8px; }
  .travel-ok { background: rgba(46,204,113,0.1); color: var(--bounce-green); }
  .travel-amber { background: rgba(243,156,18,0.1); color: var(--bounce-amber); }
  .travel-red { background: rgba(231,76,60,0.1); color: var(--bounce-red); }
  .enquiry-list { display: flex; flex-direction: column; gap: 8px; }
  .enquiry-card { background: var(--bounce-card); border: 1px solid var(--bounce-border); border-radius: 12px; padding: 14px 16px; cursor: pointer; transition: all 0.15s; }
  .enquiry-card:hover { border-color: var(--bounce-primary); }
  .enquiry-card.needs-attention { border-left: 3px solid var(--bounce-red); }
  .eq-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; flex-wrap: wrap; gap: 4px; }
  .eq-name { font-size: 14px; font-weight: 600; }
  .eq-time { font-size: 11px; color: var(--bounce-muted); }
  .eq-channel { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
  .ch-whatsapp { background: rgba(37,211,102,0.1); color: #25D366; } .ch-facebook { background: rgba(24,119,242,0.1); color: #1877F2; }
  .ch-sms { background: rgba(155,89,182,0.1); color: var(--bounce-purple); } .ch-website { background: rgba(52,152,219,0.1); color: var(--bounce-blue); }
  .ch-instagram { background: rgba(225,48,108,0.1); color: #E1306C; } .ch-app { background: rgba(255,107,53,0.1); color: var(--bounce-primary); }
  .eq-msg { font-size: 12px; color: var(--bounce-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 4px; }
  .eq-step { font-size: 10px; color: var(--bounce-amber); font-weight: 600; margin-top: 4px; }
  .bookings-table { background: var(--bounce-card); border: 1px solid var(--bounce-border); border-radius: 12px; overflow: hidden; }
  .table-row { display: grid; grid-template-columns: 2fr 1.5fr 1fr 1fr 1fr 1fr auto; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--bounce-border); align-items: center; font-size: 13px; }
  .table-row.header { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--bounce-muted); font-weight: 700; background: rgba(255,255,255,0.02); }
  .table-row:last-child { border-bottom: none; }
  .table-row:hover:not(.header) { background: rgba(255,255,255,0.02); }
  .pill { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
  .pill-green { background: rgba(46,204,113,0.1); color: var(--bounce-green); }
  .pill-amber { background: rgba(243,156,18,0.1); color: var(--bounce-amber); }
  .pill-red { background: rgba(231,76,60,0.1); color: var(--bounce-red); }
  .icon-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--bounce-border); border-radius: 6px; padding: 5px 8px; cursor: pointer; font-size: 12px; color: var(--bounce-muted); transition: all 0.15s; }
  .icon-btn:hover { color: white; border-color: #555; }
  .icon-btn.primary { background: rgba(255,107,53,0.1); border-color: rgba(255,107,53,0.3); color: var(--bounce-primary); }
  .icon-btn.primary:hover { background: var(--bounce-primary); color: white; }
  .chat-panel { width: 320px; min-width: 320px; background: #111; border-left: 1px solid var(--bounce-border); display: flex; flex-direction: column; }
  .chat-header { padding: 16px; border-bottom: 1px solid var(--bounce-border); }
  .chat-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; }
  .chat-sub { font-size: 11px; color: var(--bounce-muted); margin-top: 2px; }
  .ai-status { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
  .ai-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--bounce-green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  .ai-status-text { font-size: 11px; color: var(--bounce-green); font-weight: 600; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  .msg { max-width: 85%; }
  .msg.ai { align-self: flex-start; } .msg.user { align-self: flex-end; }
  .msg-bubble { padding: 10px 12px; border-radius: 12px; font-size: 12px; line-height: 1.5; }
  .msg.ai .msg-bubble { background: var(--bounce-card); border: 1px solid var(--bounce-border); color: var(--bounce-text); border-radius: 4px 12px 12px 12px; }
  .msg.user .msg-bubble { background: var(--bounce-primary); color: white; border-radius: 12px 4px 12px 12px; }

  .chat-input-area { padding: 12px; border-top: 1px solid var(--bounce-border); }

  .chat-input:focus { border-color: var(--bounce-primary); }
  .chat-send-btn { background: var(--bounce-primary); border: none; border-radius: 8px; padding: 8px 12px; color: white; cursor: pointer; font-size: 14px; transition: all 0.15s; }

  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .settings-card { background: var(--bounce-card); border: 1px solid var(--bounce-border); border-radius: 12px; padding: 20px; }
  .settings-card-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; color: var(--bounce-muted); }
  .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--bounce-border); }

  .setting-sub { font-size: 11px; color: var(--bounce-muted); margin-top: 2px; }
  .setting-input { background: #1a1a1a; border: 1px solid var(--bounce-border); border-radius: 6px; padding: 5px 10px; color: var(--bounce-text); font-family: 'DM Sans', sans-serif; font-size: 13px; width: 90px; text-align: right; outline: none; }

  .toggle { width: 36px; height: 20px; background: #333; border-radius: 10px; cursor: pointer; position: relative; transition: background 0.2s; }
